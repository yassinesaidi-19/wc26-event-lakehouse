resources:
  jobs:
    world_cup_pipeline_job:
      name: world-cup-pipeline
      description: Tournament lakehouse pipeline skeleton for Databricks Workflows.
      tasks:
        - task_key: ingestion
          notebook_task:
            notebook_path: /Repos/world-cup-2026-event-lakehouse/databricks/notebooks/01_ingestion
        - task_key: event_log
          depends_on:
            - task_key: ingestion
          notebook_task:
            notebook_path: /Repos/world-cup-2026-event-lakehouse/databricks/notebooks/02_event_log
        - task_key: canonical_model
          depends_on:
            - task_key: event_log
          notebook_task:
            notebook_path: /Repos/world-cup-2026-event-lakehouse/databricks/notebooks/03_canonical_model
        - task_key: state_engine
          depends_on:
            - task_key: canonical_model
          notebook_task:
            notebook_path: /Repos/world-cup-2026-event-lakehouse/databricks/notebooks/04_state_engine
        - task_key: marts_quality
          depends_on:
            - task_key: state_engine
          notebook_task:
            notebook_path: /Repos/world-cup-2026-event-lakehouse/databricks/notebooks/05_marts_quality
